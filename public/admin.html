<!DOCTYPE html>
<html>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Name"><br>
<input id="price" placeholder="Price"><br>
<input id="category" placeholder="Category"><br>
<input id="desc" placeholder="Description"><br>

<input id="i1" placeholder="Image 1"><br>
<input id="i2" placeholder="Image 2"><br>
<input id="i3" placeholder="Image 3"><br>
<input id="i4" placeholder="Image 4"><br>
<input id="i5" placeholder="Image 5"><br>

<button onclick="add()">Add Product</button>

<script>
async function add(){
  await fetch("http://localhost:5000/add-product",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:name.value,
      price:price.value,
      category:category.value,
      description:desc.value,
      images:[i1.value,i2.value,i3.value,i4.value,i5.value]
    })
  });
  alert("Product Added");
}
</script>

</body>
</html>
